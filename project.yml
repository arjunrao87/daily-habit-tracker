name: DailyHabitTracker
options:
  bundleIdPrefix: com.dailyhabittracker
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "6.0"
packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
targets:
  DailyHabitTracker:
    type: application
    platform: iOS
    sources:
      - Sources/DailyHabitTracker
      - App
    dependencies:
      - package: supabase-swift
        product: Supabase
    settings:
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      GENERATE_INFOPLIST_FILE: true
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
  DailyHabitTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/DailyHabitTrackerTests
    dependencies:
      - target: DailyHabitTracker
