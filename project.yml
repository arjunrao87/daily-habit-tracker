name: Cadence
options:
  bundleIdPrefix: com.arjunrao.cadence
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "6.0"
packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
targets:
  Cadence:
    type: application
    platform: iOS
    sources:
      - Sources/Cadence
      - App
      - Assets.xcassets
    resources:
      - Sources/Cadence/PrivacyInfo.xcprivacy
    dependencies:
      - package: supabase-swift
        product: Supabase
    settings:
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      GENERATE_INFOPLIST_FILE: true
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  CadenceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/CadenceTests
    dependencies:
      - target: Cadence
schemes:
  Cadence:
    build:
      targets:
        Cadence: all
    run:
      config: Debug
      environmentVariables:
        - variable: SUPABASE_URL
          value: https://ottrmtmnndmwtkntkfaq.supabase.co
          isEnabled: true
        - variable: SUPABASE_ANON_KEY
          value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90dHJtdG1ubmRtd3RrbnRrZmFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDAxODMsImV4cCI6MjA4OTE3NjE4M30.DW0HWOvc8Huoo7ZOA10jYXSkaskr3uIrp2G3lX2dkJE
          isEnabled: true
    test:
      config: Debug
      targets:
        - CadenceTests
      environmentVariables:
        - variable: SUPABASE_URL
          value: https://ottrmtmnndmwtkntkfaq.supabase.co
          isEnabled: true
        - variable: SUPABASE_ANON_KEY
          value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90dHJtdG1ubmRtd3RrbnRrZmFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDAxODMsImV4cCI6MjA4OTE3NjE4M30.DW0HWOvc8Huoo7ZOA10jYXSkaskr3uIrp2G3lX2dkJE
